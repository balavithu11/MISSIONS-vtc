<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Extracteur de missions</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1B2B6B;
      --navy-light: #EEF1F9;
      --bg: #F7F8FC;
      --surface: #FFFFFF;
      --border: rgba(27,43,107,0.12);
      --border-strong: rgba(27,43,107,0.25);
      --text-primary: #0F1A3E;
      --text-secondary: #5A6585;
      --text-tertiary: #9AA3BE;
      --danger: #A32D2D;
      --danger-bg: #FCEBEB;
      --radius: 12px;
      --radius-sm: 8px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

    .header { background: var(--navy); padding: 18px 20px 16px; display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .header-logo svg { width: 20px; height: 20px; }
    .header-title { color: #fff; font-size: 16px; font-weight: 600; }
    .header-sub { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 1px; }

    .main { padding: 20px 16px 40px; max-width: 520px; margin: 0 auto; }
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }

    .apikey-section { margin-bottom: 20px; }
    .apikey-row { display: flex; gap: 8px; }
    .apikey-input { flex: 1; padding: 11px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface); font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-primary); outline: none; transition: border-color 0.15s; }
    .apikey-input:focus { border-color: var(--navy); }
    .apikey-save { padding: 11px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .apikey-save:hover { border-color: var(--navy); color: var(--navy); }
    .apikey-save.saved { background: var(--navy); color: #fff; border-color: var(--navy); }
    .apikey-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 5px; }
    .apikey-hint a { color: var(--navy); }

    .drop-zone { background: var(--surface); border: 1.5px dashed var(--border-strong); border-radius: var(--radius); padding: 28px 20px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; margin-bottom: 20px; }
    .drop-zone:hover, .drop-zone.dragging { border-color: var(--navy); background: var(--navy-light); }
    .drop-zone input { display: none; }
    .drop-icon { width: 48px; height: 48px; background: var(--navy-light); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .drop-icon svg { width: 24px; height: 24px; color: var(--navy); }
    .drop-text { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
    .drop-sub { font-size: 12px; color: var(--text-tertiary); }
    .preview-img { width: 100%; max-height: 160px; object-fit: contain; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-top: 14px; }
    .preview-name { font-size: 12px; color: var(--text-secondary); margin-top: 6px; font-family: 'DM Mono', monospace; }

    .driver-section { margin-bottom: 20px; }
    .driver-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .driver-btn { padding: 11px 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; text-align: center; line-height: 1.3; }
    .driver-btn:hover:not(.active) { border-color: var(--navy); color: var(--navy); }
    .driver-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; }

    .extract-btn { width: 100%; padding: 14px; background: var(--navy); color: #fff; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
    .extract-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .extract-btn:hover:not(:disabled) { opacity: 0.9; }
    .extract-btn:active:not(:disabled) { transform: scale(0.98); }

    .loading { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 28px 20px; text-align: center; }
    .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-secondary); }

    .result-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px; }
    .result-header { background: var(--navy); padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    .result-header-avatar { width: 34px; height: 34px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; }
    .result-header-name { color: #fff; font-size: 14px; font-weight: 600; }
    .result-header-role { color: rgba(255,255,255,0.55); font-size: 11px; margin-top: 1px; }

    .field-row { display: flex; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
    .field-row:last-child { border-bottom: none; }
    .field-icon { width: 28px; height: 28px; background: var(--navy-light); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .field-icon svg { width: 14px; height: 14px; color: var(--navy); }
    .field-info { flex: 1; min-width: 0; }
    .field-label { font-size: 11px; color: var(--text-tertiary); font-weight: 500; margin-bottom: 1px; }
    .field-value { background: transparent; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--text-primary); width: 100%; padding: 0; outline: none; }
    .field-value:focus { border-bottom: 1px solid var(--navy); }
    .field-value-computed { font-size: 14px; font-weight: 500; color: var(--navy); font-family: 'DM Mono', monospace; }
    .computed-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; color: var(--navy); background: var(--navy-light); padding: 2px 7px; border-radius: 20px; flex-shrink: 0; }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .action-btn { padding: 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-primary); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .action-btn:hover { background: var(--bg); border-color: var(--navy); }
    .action-btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
    .action-btn.primary:hover { opacity: 0.88; }
    .action-btn svg { width: 15px; height: 15px; }

    .error-box { background: var(--danger-bg); border: 1px solid rgba(163,45,45,0.2); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: var(--danger); margin-bottom: 16px; }

    .new-btn { width: 100%; padding: 12px; background: transparent; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; margin-top: 10px; transition: all 0.15s; }
    .new-btn:hover { border-color: var(--navy); color: var(--navy); background: var(--navy-light); }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--navy); color: #fff; padding: 11px 22px; border-radius: 30px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M8 12h8M12 8v8"/>
    </svg>
  </div>
  <div>
    <div class="header-title">Extracteur de missions</div>
    <div class="header-sub">Transport VTC · Samway</div>
  </div>
</div>

<div class="main">

  <div class="apikey-section">
    <div class="section-label">Clé API Google Gemini</div>
    <div class="apikey-row">
      <input type="password" class="apikey-input" id="apiKey" placeholder="AIza...">
      <button class="apikey-save" id="saveBtn" onclick="saveKey()">Sauvegarder</button>
    </div>
    <div class="apikey-hint">Clé gratuite sur <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a> · Stockée sur cet appareil uniquement</div>
  </div>

  <div class="section-label">Capture d'écran</div>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <div class="drop-text">Appuyez pour importer</div>
    <div class="drop-sub">Galerie ou appareil photo</div>
    <img id="previewImg" class="preview-img" style="display:none">
    <div id="previewName" class="preview-name" style="display:none"></div>
  </div>

  <div class="driver-section">
    <div class="section-label">Chauffeur assigné</div>
    <div class="driver-grid">
      <button class="driver-btn active" data-driver="Vithurshan BALASUBRAMANIAM" onclick="selectDriver(this)">Vithurshan<br>BALASUBRAMANIAM</button>
      <button class="driver-btn" data-driver="Banujan BALASUBRAMANIAM" onclick="selectDriver(this)">Banujan<br>BALASUBRAMANIAM</button>
    </div>
  </div>

  <button class="extract-btn" id="extractBtn" disabled onclick="extractData()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Extraire les données
  </button>

  <div id="resultArea"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  let selectedDriver = 'Vithurshan BALASUBRAMANIAM';
  let imageBase64 = null;
  let imageMime = 'image/jpeg';
  let currentData = {};

  const savedKey = localStorage.getItem('gemini_api_key');
  if (savedKey) {
    document.getElementById('apiKey').value = savedKey;
    document.getElementById('saveBtn').textContent = 'Sauvegardée ✓';
    document.getElementById('saveBtn').classList.add('saved');
  }

  function saveKey() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) return;
    localStorage.setItem('gemini_api_key', key);
    const btn = document.getElementById('saveBtn');
    btn.textContent = 'Sauvegardée ✓';
    btn.classList.add('saved');
    showToast('Clé sauvegardée sur cet appareil');
    checkReady();
  }

  document.getElementById('apiKey').addEventListener('input', () => {
    const btn = document.getElementById('saveBtn');
    btn.textContent = 'Sauvegarder';
    btn.classList.remove('saved');
    checkReady();
  });

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const previewImg = document.getElementById('previewImg');
  const previewName = document.getElementById('previewName');
  const extractBtn = document.getElementById('extractBtn');
  const resultArea = document.getElementById('resultArea');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragging'); handleFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

  function handleFile(file) {
    if (!file) return;
    imageMime = file.type || 'image/jpeg';
    const reader = new FileReader();
    reader.onload = e => {
      imageBase64 = e.target.result.split(',')[1];
      previewImg.src = e.target.result;
      previewImg.style.display = 'block';
      previewName.textContent = file.name;
      previewName.style.display = 'block';
      checkReady();
    };
    reader.readAsDataURL(file);
  }

  function checkReady() {
    const key = document.getElementById('apiKey').value.trim();
    extractBtn.disabled = !(imageBase64 && key);
  }

  function selectDriver(btn) {
    document.querySelectorAll('.driver-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDriver = btn.dataset.driver;
    if (currentData.nom_client) { currentData.chauffeur = selectedDriver; renderResult(currentData); }
  }

  function addTwoHours(timeStr) {
    if (!timeStr || timeStr === '—') return '—';
    const match = timeStr.match(/(\d{1,2})[h:H](\d{0,2})/);
    if (!match) return '—';
    let h = parseInt(match[1]);
    let m = parseInt(match[2] || '0') || 0;
    h = (h + 2) % 24;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }

  async function extractData() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!imageBase64 || !apiKey) return;
    extractBtn.disabled = true;
    resultArea.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Analyse de la capture en cours...</div>
      </div>`;

    const prompt = `Tu es un assistant qui extrait des données de missions de transport VTC depuis des captures d'écran.
Réponds UNIQUEMENT en JSON valide, sans texte avant ou après, sans backticks markdown.
Format exact :
{
  "nom_client": "...",
  "lieu_prise_en_charge": "...",
  "heure_prise_en_charge": "HH:MM",
  "lieu_depose": "...",
  "nombre_passagers": "..."
}
Règles :
- heure_prise_en_charge : heure de départ/prise en charge du client (format HH:MM, pas l'heure d'arrivée du vol)
- lieu_depose : adresse complète de destination si visible
- nombre_passagers : juste le chiffre (ex: "3")
- Si une information est absente ou illisible, mets "—"`;

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                { inline_data: { mime_type: imageMime, data: imageBase64 } },
                { text: prompt }
              ]
            }],
          })
        }
      );

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      parsed.chauffeur = selectedDriver;
      parsed.heure_depose = addTwoHours(parsed.heure_prise_en_charge);
      currentData = parsed;
      renderResult(parsed);
    } catch (err) {
      resultArea.innerHTML = `<div class="error-box">Erreur : ${err.message || 'Vérifiez votre clé API et réessayez.'}</div>`;
    }
    extractBtn.disabled = false;
  }

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  }

  function renderResult(d) {
    resultArea.innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <div class="result-header-avatar">${initials(d.chauffeur)}</div>
          <div>
            <div class="result-header-name">${d.chauffeur}</div>
            <div class="result-header-role">Chauffeur assigné</div>
          </div>
        </div>
        <div class="result-fields">
          ${fieldRow('person', 'Nom du client', 'nom_client', d.nom_client)}
          ${fieldRow('map', 'Lieu de prise en charge', 'lieu_prise_en_charge', d.lieu_prise_en_charge)}
          ${fieldRow('clock', 'Heure de prise en charge', 'heure_prise_en_charge', d.heure_prise_en_charge)}
          ${fieldRow('map-pin', 'Lieu de dépose', 'lieu_depose', d.lieu_depose)}
          ${fieldRowComputed('clock', 'Heure de dépose', d.heure_depose)}
          ${fieldRow('users', 'Nombre de passagers', 'nombre_passagers', d.nombre_passagers)}
        </div>
      </div>
      <div class="actions">
        <button class="action-btn" onclick="copyText()">
          ${iconSVG('copy')} Copier texte
        </button>
        <button class="action-btn primary" onclick="copyWhatsapp()">
          ${iconSVG('send')} WhatsApp
        </button>
      </div>
      <button class="new-btn" onclick="resetForm()">Nouvelle mission</button>
    `;
  }

  function fieldRow(icon, label, key, value) {
    return `
      <div class="field-row">
        <div class="field-icon">${iconSVG(icon)}</div>
        <div class="field-info">
          <div class="field-label">${label}</div>
          <input class="field-value" value="${(value||'—').replace(/"/g,'&quot;')}" onchange="currentData['${key}']=this.value; if('${key}'==='heure_prise_en_charge'){updateDepose(this.value);}">
        </div>
      </div>`;
  }

  function fieldRowComputed(icon, label, value) {
    return `
      <div class="field-row">
        <div class="field-icon">${iconSVG(icon)}</div>
        <div class="field-info">
          <div class="field-label">${label}</div>
          <div class="field-value-computed" id="heureDepose">${value || '—'}</div>
        </div>
        <span class="computed-badge">+2h auto</span>
      </div>`;
  }

  function updateDepose(val) {
    currentData.heure_depose = addTwoHours(val);
    const el = document.getElementById('heureDepose');
    if (el) el.textContent = currentData.heure_depose;
  }

  function iconSVG(name) {
    const icons = {
      person: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`,
      map: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>`,
      clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      'map-pin': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
      users: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
      copy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
      send: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`
    };
    return icons[name] || '';
  }

  function getFormattedText() {
    return [
      `Chauffeur : ${currentData.chauffeur}`,
      `Client : ${currentData.nom_client}`,
      `Prise en charge : ${currentData.lieu_prise_en_charge} à ${currentData.heure_prise_en_charge}`,
      `Dépose : ${currentData.lieu_depose} à ${currentData.heure_depose}`,
      `Passagers : ${currentData.nombre_passagers}`,
    ].join('\n');
  }

  function copyText() {
    navigator.clipboard.writeText(getFormattedText()).then(() => showToast('Copié dans le presse-papiers'));
  }

  function copyWhatsapp() {
    navigator.clipboard.writeText(getFormattedText()).then(() => showToast('Copié — collez dans WhatsApp'));
  }

  function resetForm() {
    imageBase64 = null;
    currentData = {};
    previewImg.style.display = 'none';
    previewName.style.display = 'none';
    fileInput.value = '';
    resultArea.innerHTML = '';
    extractBtn.disabled = true;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
